global:
  resolve_timeout: 5m

# 告警路由配置
route:
  # 告警分组标签
  group_by: ['alertname', 'severity']
  
  # 第一次告警等待时间（收集同组告警）
  group_wait: 10s
  
  # 同组告警发送间隔
  group_interval: 10s
  
  # 告警重复间隔（1 小时）
  repeat_interval: 1h
  
  # 默认接收器
  receiver: 'default'
  
  # 子路由配置
  routes:
    # 严重告警立即发送
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 30m
    
    # 警告级别告警
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 1h

# 接收器配置
receivers:
  # 默认接收器（webhook）
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:8080/api/v1/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true
  
  # 严重告警接收器
  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:8080/api/v1/alerts/webhook'
        send_resolved: true
    # 可选：配置邮件通知
    # email_configs:
    #   - to: 'admin@example.com'
    #     from: 'alertmanager@example.com'
    #     smarthost: 'smtp.example.com:587'
    #     auth_username: 'alertmanager@example.com'
    #     auth_password: 'your_password'
    #     headers:
    #       Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
  
  # 警告级别接收器
  - name: 'warning'
    webhook_configs:
      - url: 'http://localhost:8080/api/v1/alerts/webhook'
        send_resolved: true

# 告警抑制规则
inhibit_rules:
  # 当应用宕机时，抑制其他所有告警
  - source_match:
      severity: 'critical'
      alertname: 'ApplicationDown'
    target_match:
      severity: 'warning'
    equal: ['instance']
