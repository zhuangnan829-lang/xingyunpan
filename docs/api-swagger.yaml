            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  share_id: 1
                  file_ids: ["file-uuid-1"]
                  file_names: ["document.pdf"]
                  creator_name: "testuser"
                  created_at: "2024-01-01T00:00:00Z"
                  expires_at: "2024-01-08T00:00:00Z"
                  has_password: true
                  download_count: 5
