              file_ids: [1, 2, 3]
      responses:
        '204':
          description: 移动成功
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - 回收站
      summary: 获取回收站列表
      description: 获取当前用户的回收站项目列表（支持分页）
      operationId: getRecycleList
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页大小
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  list:
                    - id: 1
                      file_id: "file-uuid-1"
                      file_name: "document.pdf"
                      file_size: 1048576
                      file_type: "application/pdf"
                      original_path: "/Documents/document.pdf"
                      deleted_at: "2024-01-01T00:00:00Z"
                      expires_at: "2024-01-31T00:00:00Z"
