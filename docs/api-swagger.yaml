          required: true
          description: 文件 ID
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  can_view: true
                  can_download: true
                  can_edit: true
                  is_owner: false
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 文件不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    # ========== Phase 5 Schemas ==========
    
    # 分享相关 Schemas
    CreateShareRequest:
      type: object
      properties:
        file_ids:
          type: array
          items:
            type: string
          description: 要分享的文件 ID 列表
          minItems: 1
        expires_in:
          type: integer
          nullable: true
          description: 过期天数（null 表示永不过期）
          example: 7
        access_code:
          type: string
          nullable: true
          description: 访问密码（4-8 字符，可选）
          minLength: 4
          maxLength: 8
          example: "1234"
      required:
        - file_ids

    VerifyPasswordRequest:
      type: object
      properties:
        access_code:
          type: string
          description: 访问密码
          example: "1234"
      required:
        - access_code

    # 回收站相关 Schemas
    MoveToRecycleRequest:
      type: object
      properties:
        file_ids:
          type: array
          items:
            type: integer
          description: 要移动到回收站的文件 ID 列表
          minItems: 1
          example: [1, 2, 3]
      required:
        - file_ids

    RestoreFilesRequest:
      type: object
      properties:
        item_ids:
          type: array
          items:
            type: integer
          description: 要恢复的回收站项目 ID 列表
          minItems: 1
          example: [1, 2, 3]
      required:
        - item_ids

    PermanentDeleteRequest:
      type: object
      properties:
        item_ids:
          type: array
          items:
            type: integer
          description: 要永久删除的回收站项目 ID 列表
          minItems: 1
          example: [1, 2, 3]
      required:
        - item_ids

    RecycleBinItem:
      type: object
      properties:
        id:
          type: integer
          description: 回收站项目 ID
          example: 1
        file_id:
          type: string
          description: 文件 ID
          example: "file-uuid-1"
        file_name:
          type: string
          description: 文件名
          example: "document.pdf"
        file_size:
          type: integer
          format: int64
          description: 文件大小（字节）
          example: 1048576
        file_type:
          type: string
          description: 文件类型
          example: "application/pdf"
        original_path:
          type: string
          description: 原始路径
          example: "/Documents/document.pdf"
        deleted_at:
          type: string
          format: date-time
          description: 删除时间
        expires_at:
          type: string
          format: date-time
          description: 过期时间（30 天后）

    # 协作相关 Schemas
    AddCollaboratorRequest:
      type: object
      properties:
        file_id:
          type: integer
          description: 文件 ID
          example: 1
        username:
          type: string
          description: 协作者用户名
          example: "collaborator"
        permission:
          type: string
          description: 权限级别
          enum: [view, download, edit]
          example: "edit"
      required:
        - file_id
        - username
        - permission

    UpdatePermissionRequest:
      type: object
      properties:
        permission:
          type: string
          description: 新的权限级别
          enum: [view, download, edit]
          example: "download"
      required:
        - permission

    CollaboratorInfo:
      type: object
      properties:
        user_id:
          type: integer
          description: 协作者用户 ID
          example: 2
        username:
          type: string
          description: 协作者用户名
          example: "collaborator"
        permission:
          type: string
          description: 权限级别
          enum: [view, download, edit]
          example: "edit"
        added_at:
          type: string
          format: date-time
          description: 添加时间

    FilePermission:
      type: object
      properties:
        can_view:
          type: boolean
          description: 是否可以查看
          example: true
        can_download:
          type: boolean
          description: 是否可以下载
          example: true
        can_edit:
          type: boolean
          description: 是否可以编辑
          example: true
        is_owner:
          type: boolean
          description: 是否是所有者
          example: false

    # 版本管理相关 Schemas
    VersionInfo:
      type: object
      properties:
        version_id:
          type: integer
          description: 版本 ID
          example: 1
        version_number:
          type: integer
          description: 版本号
          example: 2
        file_size:
          type: integer
          format: int64
          description: 文件大小（字节）
          example: 1048576
        created_at:
          type: string
          format: date-time
          description: 创建时间
        uploader_id:
          type: integer
          description: 上传者 ID
          example: 1
        uploader_name:
          type: string
          description: 上传者用户名
          example: "testuser"
        is_current:
          type: boolean
          description: 是否当前版本
          example: true

    # 搜索相关 Schemas
    SearchFileItem:
      type: object
      properties:
        file_id:
          type: string
          description: 文件 ID
          example: "file-uuid-1"
        file_name:
          type: string
          description: 文件名
          example: "document.pdf"
        file_type:
          type: string
          description: 文件类型
          example: "application/pdf"
        file_size:
          type: integer
          format: int64
          description: 文件大小（字节）
          example: 1048576
        file_path:
          type: string
          description: 文件路径
          example: "/Documents/document.pdf"
        modified_at:
          type: string
          format: date-time
          description: 修改时间
        is_folder:
          type: boolean
          description: 是否文件夹
          example: false

    SearchSuggestion:
      type: object
      properties:
        keyword:
          type: string
          description: 建议关键词
          example: "document.pdf"
        count:
          type: integer
          description: 匹配数量
          example: 3
