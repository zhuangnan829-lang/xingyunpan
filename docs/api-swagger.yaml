      responses:
        '204':
          description: 成功
        '404':
          description: 分享不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Phase 5: 搜索功能 API ==========
  /api/search/files:
    get:
      tags:
        - 搜索
      summary: 搜索文件
      description: 根据多种条件搜索文件（支持分页）
      operationId: searchFiles
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          description: 搜索关键词（文件名模糊匹配）
          schema:
            type: string
        - name: file_type
          in: query
          description: 文件类型过滤
          schema:
            type: string
        - name: size_min
          in: query
          description: 最小文件大小（字节）
          schema:
            type: integer
            format: int64
        - name: size_max
          in: query
          description: 最大文件大小（字节）
          schema:
            type: integer
            format: int64
        - name: date_from
          in: query
          description: 开始日期（ISO 8601 格式）
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          description: 结束日期（ISO 8601 格式）
          schema:
            type: string
            format: date-time
        - name: folder_id
          in: query
          description: 文件夹 ID（限制搜索范围）
          schema:
            type: string
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页大小
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  files:
                    - file_id: "file-uuid-1"
                      file_name: "document.pdf"
                      file_type: "application/pdf"
                      file_size: 1048576
                      file_path: "/Documents/document.pdf"
                      modified_at: "2024-01-01T00:00:00Z"
                      is_folder: false
                  total: 1
                  page: 1
                  page_size: 20
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/search/suggestions:
    get:
      tags:
        - 搜索
      summary: 获取搜索建议
      description: 根据前缀获取搜索建议（最多 10 条）
      operationId: getSearchSuggestions
      security:
        - BearerAuth: []
      parameters:
        - name: prefix
          in: query
          required: true
          description: 搜索前缀（至少 2 个字符）
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  - keyword: "document.pdf"
                    count: 3
                  - keyword: "documents"
                    count: 1
        '400':
          description: 前缀长度不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Phase 5: 回收站功能 API ==========
  /api/recycle:
