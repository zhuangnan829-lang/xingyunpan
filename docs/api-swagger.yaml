      operationId: restoreVersion
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          description: 文件 ID
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          description: 版本 ID
          schema:
            type: integer
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  new_version_id: 3
                  version_number: 3
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限恢复此文件版本
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 文件或版本不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '507':
          description: 存储空间不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

