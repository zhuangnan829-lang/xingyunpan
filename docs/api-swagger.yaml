          description: 文件 ID
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          description: 版本 ID
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功
        '400':
          description: 不能删除当前版本
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
