      description: 删除指定的分享（仅创建者可删除）
      operationId: deleteShare
      security:
        - BearerAuth: []
      parameters:
        - name: shareId
          in: path
          required: true
          description: 分享 ID
          schema:
            type: string
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限删除此分享
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 分享不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shares/{shareId}/verify:
    post:
      tags:
        - 分享
      summary: 验证分享密码
      description: 验证分享访问密码，成功后返回临时访问令牌
      operationId: verifySharePassword
      parameters:
        - name: shareId
          in: path
          required: true
          description: 分享令牌
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPasswordRequest'
            example:
              access_code: "1234"
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
              example:
                code: 200
                message: success
                data:
                  valid: true
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: 密码错误
          content:
